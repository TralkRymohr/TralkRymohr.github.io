<!DOCTYPE html>
<html lang="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imagen Expandible</title>

<style>
  body{
    margin:0;
    background:white;
    font-family:Arial, sans-serif;
    overflow-y:auto;
  }

  .contenedor{
    display:flex;
    flex-direction:column;
    align-items:center;
    position:relative;
  }

  img{
    width:200px;
    display:block;
    user-select:none;
    pointer-events:none;
  }

  .cuerpo{
    height:200px;
    object-fit:fill;
    transition:height 0.08s linear;
  }

  /* indicador longitud */
  .indicador{
    position:fixed;
    top:15px;
    right:15px;
    background:rgba(0,0,0,0.7);
    color:white;
    padding:8px 12px;
    border-radius:10px;
    font-size:14px;
    z-index:1000;
  }

  /* botón reset */
  .reset{
    position:fixed;
    right:15px;
    bottom:20px;
    background:#007bff;
    color:white;
    border:none;
    padding:12px 16px;
    border-radius:50px;
    font-size:14px;
    cursor:pointer;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
    z-index:1000;
  }

  .reset:active{
    transform:scale(0.95);
  }

  /* texto inferior */
  .info{
    text-align:center;
    margin:40px 10px;
    color:#333;
    font-size:14px;
  }

  /* minimapa */
  .minimap{
    position:fixed;
    left:10px;
    bottom:10px;
    width:80px;
    height:140px;
    background:#f0f0f0;
    border:1px solid #ccc;
    border-radius:8px;
    overflow:hidden;
    z-index:1000;
  }

  .mini-wrapper{
    transform-origin:top center;
    width:100%;
  }

  .mini-wrapper img{
    width:100%;
  }

</style>
</head>
<body>

<div class="indicador" id="indicador">0 px</div>

<button class="reset" id="resetBtn">Reset</button>

<div class="contenedor" id="contenedor">
    <img src="cabeza.png" class="cabeza" alt="Top">
    <img src="cuerpo.png" class="cuerpo" id="cuerpo" alt="Body">
    <img src="base.png" class="base" alt="Bottom">
</div>

<div class="info" id="infoText">
Usa la rueda o desliza para expandir/contraer
</div>

<!-- minimapa -->
<div class="minimap">
  <div class="mini-wrapper" id="miniWrapper">
    <img src="cabeza.png">
    <img src="cuerpo.png" id="miniCuerpo">
    <img src="base.png">
  </div>
</div>

<script>
let cuerpo = document.getElementById("cuerpo");
let miniCuerpo = document.getElementById("miniCuerpo");
let indicador = document.getElementById("indicador");
let resetBtn = document.getElementById("resetBtn");

let altura = 200;
let minAltura = 200;
let maxAltura = 6000;

/* 🔥 traducciones (10 idiomas) */
const textos = {
  es:{info:"Usa la rueda o desliza para expandir/contraer",reset:"Reset"},
  en:{info:"Use wheel or swipe to expand/shrink",reset:"Reset"},
  pt:{info:"Use a roda ou deslize para expandir/recolher",reset:"Reset"},
  fr:{info:"Utilisez la molette ou glissez pour étendre/réduire",reset:"Reset"},
  de:{info:"Mausrad oder Wischen zum Erweitern/Verkleinern",reset:"Reset"},
  it:{info:"Usa la rotella o scorri per espandere/ridurre",reset:"Reset"},
  ru:{info:"Используйте колесо или свайп для изменения",reset:"Сброс"},
  ja:{info:"ホイールまたはスワイプで伸縮",reset:"リセット"},
  zh:{info:"使用滚轮或滑动来伸缩",reset:"重置"},
  ko:{info:"휠 또는 스와이프로 늘리기/줄이기",reset:"리셋"}
};

/* detectar idioma */
let lang = navigator.language.slice(0,2);
if(!textos[lang]) lang="en";

document.getElementById("infoText").textContent = textos[lang].info;
resetBtn.textContent = textos[lang].reset;

/* actualizar tamaño */
function actualizar(){
  cuerpo.style.height = altura + "px";
  miniCuerpo.style.height = altura + "px";
  indicador.textContent = altura + " px";

  /* auto follow */
  window.scrollTo({
    top:document.body.scrollHeight,
    behavior:"auto"
  });

  /* vibración suave */
  if(navigator.vibrate){
    navigator.vibrate(5);
  }
}

/* rueda (más lento) */
window.addEventListener("wheel", e=>{
  altura += e.deltaY * 0.4; // 🔥 más lento
  altura = Math.max(minAltura, Math.min(maxAltura, altura));
  actualizar();
});

/* touch móvil */
let startY=null;

window.addEventListener("touchstart",e=>{
  startY = e.touches[0].clientY;
});

window.addEventListener("touchmove",e=>{
  if(startY===null) return;
  let diff = startY - e.touches[0].clientY;
  altura += diff * 0.35;
  altura = Math.max(minAltura, Math.min(maxAltura, altura));
  actualizar();
  startY = e.touches[0].clientY;
});

/* reset */
resetBtn.addEventListener("click",()=>{
  altura = minAltura;
  actualizar();
  window.scrollTo({top:0,behavior:"smooth"});
});

/* inicial */
actualizar();
</script>

</body>
</html>
