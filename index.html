<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generative Patterns</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        canvas {
            border: 1px solid #000;
        }
    </style>
</head>
<body>
    <canvas id="patternCanvas" width="800" height="800"></canvas>
    <script>
        const canvas = document.getElementById('patternCanvas');
        const ctx = canvas.getContext('2d');

        function drawSpiral() {
            // Draw spiral pattern
            let x = canvas.width / 2;
            let y = canvas.height / 2;
            let angle = 0;
            let radius = 0;
            ctx.beginPath();
            for (let i = 0; i < 100; i++) {
                x += radius * Math.cos(angle);
                y += radius * Math.sin(angle);
                ctx.lineTo(x, y);
                angle += Math.PI / 12;
                radius += 2;
            }
            ctx.stroke();
        }

        function drawHexagon() {
            // Draw hexagon pattern
            for (let i = 0; i < 6; i++) {
                ctx.beginPath();
                ctx.moveTo(canvas.width / 2, canvas.height / 2);
                ctx.lineTo(canvas.width / 2 + 100 * Math.cos(i * 2 * Math.PI / 6),
                           canvas.height / 2 + 100 * Math.sin(i * 2 * Math.PI / 6));
                ctx.closePath();
                ctx.stroke();
            }
        }

        function drawWave() {
            // Draw wave pattern
            ctx.beginPath();
            for (let x = 0; x < canvas.width; x++) {
                const y = canvas.height / 2 + 50 * Math.sin(x * 0.05);
                ctx.lineTo(x, y);
            }
            ctx.stroke();
        }

        function drawPatterns() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawSpiral();
            drawHexagon();
            drawWave();
        }

        drawPatterns();
    </script>
    <footer>
        <h2>&#x1F600; Enhanced Generative Patterns &#x1F600;</h2> 
    </footer>
</body>
</html>
