<body>
<div class="container">
    <a href="https://tralk.carrd.co/" class="back-button">← Regresar</a>
    <h1>Generador de marca de agua de Tralk Rymohr</h1>
    <div class="main-panel">
        <div class="canvas-wrapper">
            <canvas id="mainCanvas"></canvas>
        </div>

        <div class="controls-panel">
            <div class="button-group">
                <button id="uploadBgBtn">📷 Fondo</button>
                <input type="file" id="bgFileInput" accept="image/*" class="file-input">
                <button id="addImageBtn">🖼️ Imagen</button>
                <input type="file" id="imageFileInput" accept="image/*" class="file-input">
                <button id="addTextBtn">✏️ Texto</button>
                <button id="addGenerativeBtn">✨ Generativo</button>
            </div>

            <div id="dimensionInfo" class="dimension-info">Sin fondo (800x600)</div>

            <h3>Capas (click para seleccionar)</h3>
            <div id="layersContainer" class="layers-panel"></div>

            <div class="animation-controls">
                <button id="playPauseBtn">⏸️ Pausar</button>
                <label>Velocidad: <input type="range" id="speedSlider" min="0.1" max="3" step="0.1" value="1"></label>
            </div>

            <button id="downloadBtn" class="download-btn">⬇️ Descargar PNG</button>
        </div>
    </div>
</div>
<div class="footer">Tralk Rymohr 2026</div>

<script>
(function() {
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const bgFileInput = document.getElementById('bgFileInput');
    const uploadBgBtn = document.getElementById('uploadBgBtn');
    const imageFileInput = document.getElementById('imageFileInput');
    const addImageBtn = document.getElementById('addImageBtn');
    const addTextBtn = document.getElementById('addTextBtn');
    const addGenerativeBtn = document.getElementById('addGenerativeBtn');
    const layersContainer = document.getElementById('layersContainer');
    const downloadBtn = document.getElementById('downloadBtn');
    const dimensionInfo = document.getElementById('dimensionInfo');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const speedSlider = document.getElementById('speedSlider');

    let backgroundImage = null;
    let canvasWidth = 800, canvasHeight = 600;
    let layers = [];
    let selectedLayerIndex = -1;
    let animationFrame = null;
    let lastTimestamp = 0;
    let animationPaused = false;
    let globalTime = 0;

    let isDragging = false;
    let dragOffsetX = 0, dragOffsetY = 0;

    const generateId = () => Date.now() + '-' + Math.random().toString(36).substr(2, 9);

    function resizeCanvasToBackground() {
        if (backgroundImage) {
            canvas.width = backgroundImage.width;
            canvas.height = backgroundImage.height;
            canvasWidth = backgroundImage.width;
            canvasHeight = backgroundImage.height;
            dimensionInfo.innerText = `Resolución: ${canvasWidth} x ${canvasHeight}`;
        } else {
            canvas.width = 800;
            canvas.height = 600;
            canvasWidth = 800;
            canvasHeight = 600;
            dimensionInfo.innerText = `Sin fondo (800x600)`;
        }
        renderCanvas();
    }

    function hash(seed) {
        let h = 0;
        for (let i = 0; i < seed.length; i++) {
            h = ((h << 5) - h) + seed.charCodeAt(i);
            h |= 0;
        }
        return Math.abs(h) / 0x7fffffff;
    }

    function drawElement(layer, x, y, width, height, extraTransform = {}) {
        ctx.save();
        ctx.globalAlpha = layer.opacity * (extraTransform.opacity || 1);

        let finalX = x + (extraTransform.dx || 0);
        let finalY = y + (extraTransform.dy || 0);
        let finalWidth = width * (extraTransform.scale || 1);
        let finalHeight = height * (extraTransform.scale || 1);
        let finalRotation = (layer.rotation || 0) + (extraTransform.rotation || 0);

        if (layer.type === 'image') {
            if (!layer.image) return;
            if (finalRotation !== 0) {
                const cx = finalX + finalWidth / 2;
                const cy = finalY + finalHeight / 2;
                ctx.translate(cx, cy);
                ctx.rotate(finalRotation * Math.PI / 180);
                ctx.drawImage(layer.image, -finalWidth/2, -finalHeight/2, finalWidth, finalHeight);
            } else {
                ctx.drawImage(layer.image, finalX, finalY, finalWidth, finalHeight);
            }
        } else if (layer.type === 'text') {
            ctx.font = `${layer.fontSize * (extraTransform.scale || 1)}px ${layer.fontFamily}`;
            ctx.fillStyle = extraTransform.color || layer.color;
            if (finalRotation !== 0) {
                ctx.translate(finalX, finalY);
                ctx.rotate(finalRotation * Math.PI / 180);
                ctx.fillText(layer.content, 0, 0);
            } else {
                ctx.fillText(layer.content, finalX, finalY);
            }
        }
        ctx.restore();
    }

    // NUEVOS PATRONES GENERATIVOS
    function drawGenerativePattern(layer) {
        const time = globalTime * (layer.speed || 1);
        const style = layer.generativeStyle || 'waves';
        const lineWidth = layer.lineWidth || 2;
        const scale = layer.generativeScale || 1;

        ctx.save();
        ctx.globalAlpha = layer.opacity;

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;

        if (style === 'waves') {
            ctx.fillStyle = layer.color1 || '#ff5555';
            for (let i = 0; i < 20; i++) {
                const y = canvas.height * (i / 20) + Math.sin(time * 0.01 + i) * 50 * scale;
                ctx.fillRect(0, y, canvas.width, lineWidth);
            }
        } 
        else if (style === 'dots') {
            ctx.fillStyle = layer.color1 || '#55ff55';
            for (let i = 0; i < 100; i++) {
                const x = (Math.sin(time * 0.02 + i) * 0.5 + 0.5) * canvas.width;
                const y = (Math.cos(time * 0.03 + i) * 0.5 + 0.5) * canvas.height;
                ctx.beginPath();
                ctx.arc(x, y, (lineWidth * 2) * scale, 0, 2 * Math.PI);
                ctx.fill();
            }
        } 
        else if (style === 'lines') {
            ctx.strokeStyle = layer.color1 || '#55aaff';
            ctx.lineWidth = lineWidth;
            for (let i = 0; i < 10; i++) {
                const angle = time * 0.01 + i;
                const x1 = centerX + Math.cos(angle) * 300 * scale;
                const y1 = centerY + Math.sin(angle) * 300 * scale;
                const x2 = centerX + Math.cos(angle + Math.PI) * 300 * scale;
                const y2 = centerY + Math.sin(angle + Math.PI) * 300 * scale;
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }
        } 
        else if (style === 'grid') {
            ctx.strokeStyle = layer.color1 || '#ffaa55';
            ctx.lineWidth = lineWidth;
            const cols = 10;
            const rows = 10;
            const cellW = canvas.width / cols;
            const cellH = canvas.height / rows;
            for (let i = 0; i <= cols; i++) {
                for (let j = 0; j <= rows; j++) {
                    const x = i * cellW + Math.sin(time * 0.02 + j) * 10 * scale;
                    const y = j * cellH + Math.cos(time * 0.02 + i) * 10 * scale;
                    if (i < cols) {
                        ctx.beginPath();
                        ctx.moveTo(x, y);
                        ctx.lineTo(x + cellW + Math.sin(time * 0.02 + j+1) * 10 * scale, y);
                        ctx.stroke();
                    }
                    if (j < rows) {
                        ctx.beginPath();
                        ctx.moveTo(x, y);
                        ctx.lineTo(x, y + cellH + Math.cos(time * 0.02 + i+1) * 10 * scale);
                        ctx.stroke();
                    }
                }
            }
        }
        else if (style === 'spiral') {
            ctx.fillStyle = layer.color1 || '#ff00ff';
            const maxRadius = Math.min(centerX, centerY) * scale;
            for (let i = 0; i < 200; i++) {
                const angle = (i * 0.05) + time * 0.02;
                const radius = (i / 200) * maxRadius;
                const x = centerX + radius * Math.cos(angle);
                const y = centerY + radius * Math.sin(angle);
                ctx.beginPath();
                ctx.arc(x, y, lineWidth, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        else if (style === 'hexagon') {
            ctx.strokeStyle = layer.color1 || '#00ffff';
            ctx.lineWidth = lineWidth;
            const size = 30 * scale;
            for (let i = 0; i < 6; i++) {
                const angle = (Math.PI / 3) * i + time * 0.005;
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(angle);
                drawHexagon(0, 0, size);
                ctx.restore();
            }
        }
        else if (style === 'radial-wave') {
            ctx.strokeStyle = layer.color1 || '#ffff00';
            ctx.lineWidth = lineWidth;
            for (let r = 20; r < 300 * scale; r += 30) {
                ctx.beginPath();
                for (let angle = 0; angle < Math.PI * 2; angle += 0.1) {
                    const distort = Math.sin(angle * 4 + time * 0.03) * 10 * scale;
                    const x = centerX + (r + distort) * Math.cos(angle);
                    const y = centerY + (r + distort) * Math.sin(angle);
                    if (angle === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.stroke();
            }
        }

        ctx.restore();
    }

    // Función auxiliar para dibujar hexágono (CORREGIDA: se añadió beginPath)
    function drawHexagon(x, y, size) {
        ctx.beginPath();  // <-- importante para no acumular trazados anteriores
        for (let i = 0; i < 6; i++) {
            const angle = (Math.PI / 3) * i;
            const nextAngle = (Math.PI / 3) * (i + 1);
            const x1 = x + size * Math.cos(angle);
            const y1 = y + size * Math.sin(angle);
            const x2 = x + size * Math.cos(nextAngle);
            const y2 = y + size * Math.sin(nextAngle);
            if (i === 0) ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
        }
        ctx.closePath();
        ctx.stroke();
    }

    function drawLayer(layer) {
        if (layer.type === 'generative') {
            drawGenerativePattern(layer);
            return;
        }

        if (layer.pattern) {
            let baseWidth, baseHeight;
            if (layer.type === 'image') {
                baseWidth = layer.width;
                baseHeight = layer.height;
            } else {
                ctx.font = `${layer.fontSize}px ${layer.fontFamily}`;
                const metrics = ctx.measureText(layer.content);
                baseWidth = metrics.width;
                baseHeight = layer.fontSize * 1.2;
            }
            let stepX = baseWidth + (layer.patternSpacingX || 20);
            let stepY = baseHeight + (layer.patternSpacingY || 20);
            stepX = Math.max(1, stepX);
            stepY = Math.max(1, stepY);

            const startX = layer.x;
            const startY = layer.y;
            const style = layer.patternStyle || 'grid';

            if (style === 'grid') {
                const iMin = Math.ceil((0 - startX) / stepX);
                const iMax = Math.floor((canvas.width - startX) / stepX);
                const jMin = Math.ceil((0 - startY) / stepY);
                const jMax = Math.floor((canvas.height - startY) / stepY);
                for (let j = jMin; j <= jMax; j++) {
                    for (let i = iMin; i <= iMax; i++) {
                        const x = startX + i * stepX;
                        const y = startY + j * stepY;
                        if (layer.type === 'image') {
                            drawElement(layer, x, y, layer.width, layer.height);
                        } else {
                            drawElement(layer, x, y + baseHeight * 0.8);
                        }
                    }
                }
            } else if (style === 'brick') {
                const iMin = Math.ceil((0 - startX) / stepX) - 1;
                const iMax = Math.floor((canvas.width - startX) / stepX) + 1;
                const jMin = Math.ceil((0 - startY) / stepY) - 1;
                const jMax = Math.floor((canvas.height - startY) / stepY) + 1;
                for (let j = jMin; j <= jMax; j++) {
                    const offsetX = (j % 2 === 0) ? 0 : stepX / 2;
                    for (let i = iMin; i <= iMax; i++) {
                        const x = startX + i * stepX + offsetX;
                        const y = startY + j * stepY;
                        if (x + baseWidth > 0 && x < canvas.width && y + baseHeight > 0 && y < canvas.height) {
                            if (layer.type === 'image') {
                                drawElement(layer, x, y, layer.width, layer.height);
                            } else {
                                drawElement(layer, x, y + baseHeight * 0.8);
                            }
                        }
                    }
                }
            } else if (style === 'random') {
                const area = canvas.width * canvas.height;
                const cellArea = stepX * stepY;
                const count = Math.floor(area / cellArea * 1.5);
                for (let n = 0; n < count; n++) {
                    const x = Math.random() * (canvas.width - baseWidth);
                    const y = Math.random() * (canvas.height - baseHeight);
                    if (layer.type === 'image') {
                        drawElement(layer, x, y, layer.width, layer.height);
                    } else {
                        drawElement(layer, x, y + baseHeight * 0.8);
                    }
                }
            } else if (style === 'doodle') {
                const iMin = Math.ceil((0 - startX) / stepX);
                const iMax = Math.floor((canvas.width - startX) / stepX);
                const jMin = Math.ceil((0 - startY) / stepY);
                const jMax = Math.floor((canvas.height - startY) / stepY);
                for (let j = jMin; j <= jMax; j++) {
                    for (let i = iMin; i <= iMax; i++) {
                        const seed = `${i},${j}`;
                        const r = hash(seed);
                        const r2 = hash(seed + 'x');
                        const r3 = hash(seed + 'y');
                        const time = globalTime * 0.001;

                        const scale = 0.2 + 0.8 * r;
                        const rotation = (r2 - 0.5) * 60;
                        const dx = (r3 - 0.5) * stepX * 0.3;
                        const dy = (hash(seed + 'dy') - 0.5) * stepY * 0.3;

                        const animFactor = Math.sin(time * 5 + i * 2 + j * 3) * 0.2;
                        const finalScale = Math.max(0.1, scale + animFactor * 0.2);
                        const finalRotation = rotation + animFactor * 20;

                        const x = startX + i * stepX;
                        const y = startY + j * stepY;

                        let extraColor = null;
                        if (layer.type === 'text') {
                            const hue = (r * 360 + time * 50) % 360;
                            extraColor = `hsl(${hue}, 80%, 60%)`;
                        }

                        if (layer.type === 'image') {
                            drawElement(layer, x, y, layer.width, layer.height, {
                                scale: finalScale,
                                rotation: finalRotation,
                                dx: dx,
                                dy: dy
                            });
                        } else {
                            drawElement(layer, x, y + baseHeight * 0.8, null, null, {
                                scale: finalScale,
                                rotation: finalRotation,
                                dx: dx,
                                dy: dy,
                                color: extraColor
                            });
                        }
                    }
                }
            }
        } else {
            if (layer.type === 'image') {
                drawElement(layer, layer.x, layer.y, layer.width, layer.height);
            } else if (layer.type === 'text') {
                drawElement(layer, layer.x, layer.y);
            }
        }
    }

    function renderCanvas(showSelection = true) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (backgroundImage) {
            ctx.drawImage(backgroundImage, 0, 0);
        } else {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        layers.forEach(layer => drawLayer(layer));

        if (showSelection && selectedLayerIndex !== -1 && layers[selectedLayerIndex]) {
            const layer = layers[selectedLayerIndex];
            ctx.save();
            ctx.strokeStyle = '#FF8FCF';
            ctx.lineWidth = 3;
            ctx.setLineDash([8, 8]);
            if (layer.type === 'image') {
                ctx.strokeRect(layer.x, layer.y, layer.width, layer.height);
            } else if (layer.type === 'text') {
                ctx.font = `${layer.fontSize}px ${layer.fontFamily}`;
                const metrics = ctx.measureText(layer.content);
                const w = metrics.width;
                const h = layer.fontSize * 1.2;
                ctx.strokeRect(layer.x, layer.y - h * 0.8, w, h);
            } else if (layer.type === 'generative') {
                ctx.strokeRect(0, 0, canvas.width, canvas.height);
            }
            ctx.restore();
        }
    }

    function animate(timestamp) {
        if (!animationPaused) {
            if (lastTimestamp) {
                const delta = (timestamp - lastTimestamp) * speedSlider.value;
                globalTime += delta;
            }
            lastTimestamp = timestamp;
            renderCanvas();
        }
        animationFrame = requestAnimationFrame(animate);
    }

    function startAnimation() {
        if (!animationFrame) {
            lastTimestamp = performance.now();
            animationFrame = requestAnimationFrame(animate);
        }
    }

    function getCanvasCoords(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        return {
            x: (e.clientX - rect.left) * scaleX,
            y: (e.clientY - rect.top) * scaleY
        };
    }

    function handleMouseDown(e) {
        if (selectedLayerIndex === -1) return;
        const layer = layers[selectedLayerIndex];
        if (!layer || layer.type === 'generative') return;

        const { x, y } = getCanvasCoords(e);
        let hit = false;

        if (layer.type === 'image') {
            if (x >= layer.x && x <= layer.x + layer.width &&
                y >= layer.y && y <= layer.y + layer.height) {
                hit = true;
                dragOffsetX = x - layer.x;
                dragOffsetY = y - layer.y;
            }
        } else if (layer.type === 'text') {
            ctx.font = `${layer.fontSize}px ${layer.fontFamily}`;
            const metrics = ctx.measureText(layer.content);
            const w = metrics.width;
            const h = layer.fontSize * 1.2;
            const boxY = layer.y - h * 0.8;
            if (x >= layer.x && x <= layer.x + w && y >= boxY && y <= boxY + h) {
                hit = true;
                dragOffsetX = x - layer.x;
                dragOffsetY = y - layer.y;
            }
        }

        if (hit) {
            isDragging = true;
            e.preventDefault();
        }
    }

    function handleMouseMove(e) {
        if (!isDragging || selectedLayerIndex === -1) return;
        const layer = layers[selectedLayerIndex];
        const { x, y } = getCanvasCoords(e);

        let newX = x - dragOffsetX;
        let newY = y - dragOffsetY;

        if (layer.type === 'image') {
            newX = Math.max(0, Math.min(newX, canvas.width - layer.width));
            newY = Math.max(0, Math.min(newY, canvas.height - layer.height));
        }

        layer.x = newX;
        layer.y = newY;
        renderCanvas();
        e.preventDefault();
    }

    function handleMouseUp(e) {
        isDragging = false;
    }

    function handleWheel(e) {
        if (selectedLayerIndex === -1) return;
        const layer = layers[selectedLayerIndex];
        if (layer.type === 'generative') return;
        e.preventDefault();
        const delta = e.deltaY > 0 ? -5 : 5;
        layer.rotation = (layer.rotation || 0) + delta;
        renderCanvas();
    }

    canvas.addEventListener('mousedown', handleMouseDown);
    canvas.addEventListener('mousemove', handleMouseMove);
    canvas.addEventListener('mouseup', handleMouseUp);
    canvas.addEventListener('mouseleave', handleMouseUp);
    canvas.addEventListener('wheel', handleWheel, { passive: false });

    uploadBgBtn.addEventListener('click', () => bgFileInput.click());
    bgFileInput.addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;
        const img = new Image();
        img.onload = () => {
            backgroundImage = img;
            resizeCanvasToBackground();
            bgFileInput.value = '';
        };
        img.src = URL.createObjectURL(file);
    });

    addImageBtn.addEventListener('click', () => imageFileInput.click());
    imageFileInput.addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;
        const img = new Image();
        img.onload = () => {
            let w = img.width;
            let h = img.height;
            if (w > canvasWidth || h > canvasHeight) {
                const ratio = Math.min(canvasWidth / w, canvasHeight / h);
                w = Math.floor(w * ratio);
                h = Math.floor(h * ratio);
            }
            const newLayer = {
                id: generateId(),
                type: 'image',
                image: img,
                originalWidth: img.width,
                originalHeight: img.height,
                x: 0,
                y: 0,
                width: w,
                height: h,
                opacity: 1,
                rotation: 0,
                pattern: false,
                patternStyle: 'grid',
                patternSpacingX: 20,
                patternSpacingY: 20,
            };
            layers.push(newLayer);
            selectedLayerIndex = layers.length - 1;
            updateLayersPanel();
            renderCanvas();
            imageFileInput.value = '';
        };
        img.src = URL.createObjectURL(file);
    });

    addTextBtn.addEventListener('click', () => {
        const newLayer = {
            id: generateId(),
            type: 'text',
            content: 'Marca',
            fontFamily: 'Staatliches',
            fontSize: 48,
            color: '#5C5C5C',
            x: 50,
            y: 100,
            opacity: 0.8,
            rotation: 0,
            pattern: false,
            patternStyle: 'grid',
            patternSpacingX: 80,
            patternSpacingY: 100,
        };
        layers.push(newLayer);
        selectedLayerIndex = layers.length - 1;
        updateLayersPanel();
        renderCanvas();
    });

    addGenerativeBtn.addEventListener('click', () => {
        const newLayer = {
            id: generateId(),
            type: 'generative',
            generativeStyle: 'waves',
            color1: '#FF8FCF',
            speed: 1,
            opacity: 0.7,
            lineWidth: 2,
            generativeScale: 1,
        };
        layers.push(newLayer);
        selectedLayerIndex = layers.length - 1;
        updateLayersPanel();
        renderCanvas();
    });

    playPauseBtn.addEventListener('click', () => {
        if (animationPaused) {
            animationPaused = false;
            playPauseBtn.textContent = '⏸️ Pausar';
        } else {
            animationPaused = true;
            playPauseBtn.textContent = '▶️ Reanudar';
        }
    });

    downloadBtn.addEventListener('click', () => {
        renderCanvas(false);
        const link = document.createElement('a');
        link.download = backgroundImage ? 'imagen_con_marca.png' : 'lienzo.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        renderCanvas(true);
    });

    resizeCanvasToBackground();
    updateLayersPanel();
    startAnimation();
})();
</script>
</body>
</html>
