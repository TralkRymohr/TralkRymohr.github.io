    <canvas id="canvas" style="width: 100%; height: auto;"></canvas>
    <script>
        function updateLayersPanel(){
            // Code to update layers panel
        }

        function init() {
            // Initialization code
            updateLayersPanel(); // Ensure this is called after initialization
        }

        function maintainAspectRatio(originalWidth, originalHeight, maxWidth) {
            const ratio = originalHeight / originalWidth;
            const newWidth = maxWidth;
            const newHeight = newWidth * ratio;
            return { width: newWidth, height: newHeight };
        }

        // Example of using maintainAspectRatio
        const image = new Image();
        image.src = 'your-image-source.jpg';
        image.onload = function() {
            const { width, height } = maintainAspectRatio(image.width, image.height, 500);
            // Use width and height as needed
        };

        init();
    </script>
